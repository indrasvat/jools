			shellScript = "INFO_PLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\nGIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo \"unknown\")\n# Detached-HEAD-safe branch lookup. CI builds check out a\n# specific commit (detached HEAD) where `git rev-parse\n# --abbrev-ref HEAD` returns literal \"HEAD\", which ends up\n# baked into the Info.plist as the branch name. Prefer\n# $GITHUB_REF_NAME when it's set (GitHub Actions supplies it\n# with the real branch/tag), otherwise fall back to the git\n# query, and finally to \"unknown\". (CodeRabbit review.)\nif [ -n \"${GITHUB_REF_NAME:-}\" ]; then\n  GIT_BRANCH=\"${GITHUB_REF_NAME}\"\nelse\n  BRANCH_RAW=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo \"unknown\")\n  if [ \"${BRANCH_RAW}\" = \"HEAD\" ]; then\n    GIT_BRANCH=\"detached\"\n  else\n    GIT_BRANCH=\"${BRANCH_RAW}\"\n  fi\nfi\nBUILD_DATE=$(date -u +\"%Y-%m-%d %H:%M UTC\")\n\n/usr/libexec/PlistBuddy -c \"Delete :JOOLS_GIT_SHA\" \"$INFO_PLIST\" >/dev/null 2>&1 || true\n/usr/libexec/PlistBuddy -c \"Delete :JOOLS_GIT_BRANCH\" \"$INFO_PLIST\" >/dev/null 2>&1 || true\n/usr/libexec/PlistBuddy -c \"Delete :JOOLS_BUILD_DATE\" \"$INFO_PLIST\" >/dev/null 2>&1 || true\n\n/usr/libexec/PlistBuddy -c \"Add :JOOLS_GIT_SHA string $GIT_SHA\" \"$INFO_PLIST\"\n/usr/libexec/PlistBuddy -c \"Add :JOOLS_GIT_BRANCH string $GIT_BRANCH\" \"$INFO_PLIST\"\n/usr/libexec/PlistBuddy -c \"Add :JOOLS_BUILD_DATE string $BUILD_DATE\" \"$INFO_PLIST\"\n";
