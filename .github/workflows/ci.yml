name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so PRs don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint — fast feedback before the build/test jobs spin up.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        # Match the local dev workflow (lefthook + `make lint`) which
        # treats existing style warnings as warnings, not errors.
        # Bumping these to errors should be a deliberate cleanup pass,
        # not a side effect of adding CI.
        run: swiftlint lint --reporter github-actions-logging

  # ────────────────────────────────────────────────────────────────────
  # JoolsKit — pure Swift package, no Xcode dependency.
  # Runs even if the iOS app job is gated on a specific Xcode version.
  # ────────────────────────────────────────────────────────────────────
  joolskit:
    name: JoolsKit (build + test)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            JoolsKit/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('JoolsKit/Package.resolved', 'JoolsKit/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build JoolsKit
        run: |
          cd JoolsKit
          swift build --configuration debug

      - name: Test JoolsKit
        run: |
          cd JoolsKit
          swift test --configuration debug

  # ────────────────────────────────────────────────────────────────────
  # iOS app — full build + xcodebuild test on a simulator.
  # Picks the first available iPhone simulator at runtime so the job
  # isn't pinned to a model name that might not ship with the runner.
  # ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS app (build + test)
    runs-on: macos-15
    timeout-minutes: 30
    needs: [lint, joolskit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen xcpretty

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          # Find the first available iPhone simulator. The runner image
          # ships with whatever the bundled Xcode supports — we can't
          # hard-code "iPhone 17 Pro" because the model lineup churns.
          DEST=$(xcrun simctl list devices available | \
            awk '/^-- iOS/{capture=1} /^--/{if (capture && !/^-- iOS/) capture=0} capture && /iPhone/{print; exit}')
          UDID=$(echo "$DEST" | grep -oE '[A-F0-9-]{36}')
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on the runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $DEST"

      - name: Build iOS app
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          set -o pipefail
          xcodebuild \
            -project Jools.xcodeproj \
            -scheme Jools \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -configuration Debug \
            -derivedDataPath .build/derived \
            build | xcpretty --color || exit 1

      - name: Run iOS app tests
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          set -o pipefail
          xcodebuild \
            -project Jools.xcodeproj \
            -scheme Jools \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -configuration Debug \
            -derivedDataPath .build/derived \
            test | xcpretty --color --report junit --output .build/test-report.xml || exit 1

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-report
          path: .build/test-report.xml
          if-no-files-found: ignore
