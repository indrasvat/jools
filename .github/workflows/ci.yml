name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so PRs don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint — fast feedback before the build/test jobs spin up.
  # Uses `make lint` so the local dev workflow and CI run the exact
  # same SwiftLint invocation.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: make lint
        run: make lint

  # ────────────────────────────────────────────────────────────────────
  # JoolsKit — pure Swift package, no Xcode app dependency.
  # Runs in parallel with lint. Uses `make kit-build` + `make kit-test`
  # so the package commands stay in lockstep with local dev.
  # ────────────────────────────────────────────────────────────────────
  joolskit:
    name: JoolsKit (build + test)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            JoolsKit/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('JoolsKit/Package.resolved', 'JoolsKit/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: make kit-build
        run: make kit-build

      - name: make kit-test
        run: make kit-test

  # ────────────────────────────────────────────────────────────────────
  # iOS app — full build + xcodebuild test on a simulator.
  # Picks the first available iPhone simulator at runtime so the job
  # isn't pinned to a model name that might not ship with the runner.
  # Drives the actual build/test through `make build` and
  # `make test-app` (overriding SIMULATOR) so behaviour matches local.
  # ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS app (build + test)
    runs-on: macos-15
    timeout-minutes: 30
    needs: [lint, joolskit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install build tools
        # xcpretty is a Ruby gem (no longer in homebrew), xcodegen is
        # the formula. The local Makefile installs them the same way.
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: make generate
        run: make generate

      - name: Pick a simulator
        id: sim
        run: |
          # Find the first available iPhone simulator. The runner image
          # ships with whatever the bundled Xcode supports — we can't
          # hard-code "iPhone 17 Pro" because the model lineup churns.
          DEST=$(xcrun simctl list devices available | \
            awk '/^-- iOS/{capture=1} /^--/{if (capture && !/^-- iOS/) capture=0} capture && /iPhone/{print; exit}')
          NAME=$(echo "$DEST" | sed -E 's/^[[:space:]]*//; s/ \([A-F0-9-]{36}\).*$//')
          if [ -z "$NAME" ]; then
            echo "::error::No iPhone simulator available on the runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $NAME"

      - name: make build
        env:
          SIM_NAME: ${{ steps.sim.outputs.name }}
        run: make build SIMULATOR="$SIM_NAME"

      - name: make test-app
        env:
          SIM_NAME: ${{ steps.sim.outputs.name }}
        run: make test-app SIMULATOR="$SIM_NAME"
