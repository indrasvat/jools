name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so PRs don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the Xcode channel so cache keys stay stable across runs. Bumps
  # safely invalidate DerivedData via the xcode-build hash below.
  XCODE_VERSION: latest-stable

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint — fast feedback, runs in parallel with everything else.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: make lint
        run: make lint

  # ────────────────────────────────────────────────────────────────────
  # JoolsKit — pure Swift package. Runs in parallel with everything.
  # ────────────────────────────────────────────────────────────────────
  joolskit:
    name: JoolsKit (build + test)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            JoolsKit/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('JoolsKit/Package.resolved', 'JoolsKit/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: make kit-build
        run: make kit-build

      - name: make kit-test
        run: make kit-test

  # ────────────────────────────────────────────────────────────────────
  # iOS app — single unified build + test job.
  #
  # Earlier iterations split this into `ios-build` + `ios-test-unit` +
  # `ios-test-ui` with artifact hand-off, banking on parallelism
  # between the two test targets. That lost wall-clock time, not won
  # it: each test-job runner paid its own cold simulator boot (~1-2
  # min) and test-runner bootstrap (~30 s) on top of re-discovering a
  # valid simulator via simctl (which itself was 20-100 s on a cold
  # GitHub runner). The per-split overhead ran to ~5 min, which is
  # more than the JoolsTests tests take in total. Splitting iOS tests
  # is only worthwhile when unit tests are much slower than sim
  # overhead — not the case here.
  #
  # The keep here is the DerivedData cache across runs, which lets
  # warm rebuilds skip ~90% of Swift compilation. Source-file hashing
  # plus the Xcode build version guarantees cache safety.
  # ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS (build + test)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve Xcode build version
        id: xcode-version
        run: |
          xcodebuild -version
          # Hash the Xcode build number into cache keys so an Xcode
          # bump safely invalidates DerivedData. Otherwise stale
          # module artifacts from the old compiler produce link
          # errors.
          XCODE_BUILD=$(xcodebuild -version | awk '/Build version/ {print $3}')
          echo "build=$XCODE_BUILD" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install xcodegen

      - name: make generate
        run: make generate

      - name: Cache DerivedData (incremental Swift builds)
        uses: actions/cache@v4
        with:
          path: .ci-build
          # Swap on any source / manifest change. The `restore-keys`
          # fallback lets Swift do a fast incremental rebuild even on
          # a partial hit (it diffs module hashes internally).
          key: ${{ runner.os }}-xcode${{ steps.xcode-version.outputs.build }}-dd-${{ hashFiles('Jools/**/*.swift', 'JoolsKit/Sources/**/*.swift', 'JoolsTests/**/*.swift', 'JoolsUITests/**/*.swift', 'JoolsKit/Package.resolved', 'project.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcode${{ steps.xcode-version.outputs.build }}-dd-

      - name: make ci-build-for-testing
        run: make ci-build-for-testing

      - name: make ci-test
        # Runs both JoolsTests and JoolsUITests in a single
        # xcodebuild test-without-building invocation so the
        # simulator is booted once (not twice) and the test runner
        # bootstrap cost is paid once (not twice).
        run: make ci-test
