name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so PRs don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the Xcode channel so cache keys stay stable across runs. Bumps
  # safely invalidate DerivedData via the xcode-build hash below.
  XCODE_VERSION: latest-stable

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint — fast feedback, runs in parallel with everything else.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: make lint
        run: make lint

  # ────────────────────────────────────────────────────────────────────
  # JoolsKit — pure Swift package. Runs in parallel with everything.
  # ────────────────────────────────────────────────────────────────────
  joolskit:
    name: JoolsKit (build + test)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            JoolsKit/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('JoolsKit/Package.resolved', 'JoolsKit/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: make kit-build
        run: make kit-build

      - name: make kit-test
        run: make kit-test

  # ────────────────────────────────────────────────────────────────────
  # iOS build — compile app + tests ONCE, cache DerivedData across
  # runs, upload the build products as an artifact that the two test
  # jobs share. Measured locally: cold ~25s (warm module cache),
  # warm rebuild ~3s. On a fresh CI runner cold builds are longer
  # (~3-5 min) but warm rebuilds should still be under a minute.
  # ────────────────────────────────────────────────────────────────────
  ios-build:
    name: iOS (build-for-testing)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve Xcode build version
        id: xcode-version
        run: |
          xcodebuild -version
          # Hash the Xcode build number into cache keys so an Xcode
          # bump safely invalidates DerivedData. Otherwise stale module
          # artifacts from the old compiler produce link errors.
          XCODE_BUILD=$(xcodebuild -version | awk '/Build version/ {print $3}')
          echo "build=$XCODE_BUILD" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install xcodegen

      - name: make generate
        run: make generate

      - name: Pick a simulator
        id: sim
        run: |
          # Pick the first available iPhone simulator. Runner images
          # churn simulator lineups so hardcoding a model name breaks.
          DEST=$(xcrun simctl list devices available | \
            awk '/^-- iOS/{capture=1} /^--/{if (capture && !/^-- iOS/) capture=0} capture && /iPhone/{print; exit}')
          UDID=$(echo "$DEST" | grep -oE '[A-F0-9-]{36}' | head -1)
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on the runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Picked simulator UDID: $UDID"

      - name: Cache DerivedData (incremental Swift builds)
        uses: actions/cache@v4
        with:
          path: .ci-build
          # Swap on any source / manifest change. The `restore-keys`
          # fallback lets Swift do a fast incremental rebuild even on
          # a partial hit (it diffs module hashes internally).
          key: ${{ runner.os }}-xcode${{ steps.xcode-version.outputs.build }}-dd-${{ hashFiles('Jools/**/*.swift', 'JoolsKit/Sources/**/*.swift', 'JoolsTests/**/*.swift', 'JoolsUITests/**/*.swift', 'JoolsKit/Package.resolved', 'project.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcode${{ steps.xcode-version.outputs.build }}-dd-

      - name: make ci-build-for-testing
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: make ci-build-for-testing SIM_UDID="$SIM_UDID"

      - name: make ci-package-build
        run: make ci-package-build

      - name: Upload build-products artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-products
          path: build-products.tar
          retention-days: 1
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────
  # iOS unit tests — downloads the shared build artifact and runs
  # JoolsTests only. Measured locally: ~9s end-to-end.
  # ────────────────────────────────────────────────────────────────────
  ios-test-unit:
    name: iOS unit tests (JoolsTests)
    runs-on: macos-15
    timeout-minutes: 10
    needs: [ios-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Download build-products artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build-products

      - name: make ci-unpack-build
        run: make ci-unpack-build

      - name: Pick a simulator
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available | \
            awk '/^-- iOS/{capture=1} /^--/{if (capture && !/^-- iOS/) capture=0} capture && /iPhone/{print; exit}')
          UDID=$(echo "$DEST" | grep -oE '[A-F0-9-]{36}' | head -1)
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on the runner."
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Pre-boot simulator
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        # Warm the simulator before xcodebuild so the first test
        # doesn't eat 15-20s of cold boot time.
        run: |
          xcrun simctl boot "${SIM_UDID}" || true
          xcrun simctl bootstatus "${SIM_UDID}" -b || true

      - name: make ci-test-unit
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: make ci-test-unit SIM_UDID="$SIM_UDID"

  # ────────────────────────────────────────────────────────────────────
  # iOS UI tests — same shared artifact, targets JoolsUITests.
  # Runs in parallel with ios-test-unit so wall time is
  # max(unit, ui), not unit + ui. Measured locally: ~91s.
  # ────────────────────────────────────────────────────────────────────
  ios-test-ui:
    name: iOS UI tests (JoolsUITests)
    runs-on: macos-15
    timeout-minutes: 15
    needs: [ios-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Download build-products artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build-products

      - name: make ci-unpack-build
        run: make ci-unpack-build

      - name: Pick a simulator
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available | \
            awk '/^-- iOS/{capture=1} /^--/{if (capture && !/^-- iOS/) capture=0} capture && /iPhone/{print; exit}')
          UDID=$(echo "$DEST" | grep -oE '[A-F0-9-]{36}' | head -1)
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on the runner."
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Pre-boot simulator
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          xcrun simctl boot "${SIM_UDID}" || true
          xcrun simctl bootstatus "${SIM_UDID}" -b || true

      - name: make ci-test-ui
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: make ci-test-ui SIM_UDID="$SIM_UDID"
