name: Jataayu
options:
  bundleIdPrefix: com.indrasvat
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.1"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    # ENABLE_USER_SCRIPT_SANDBOXING intentionally moved to the Jools
    # target (see `targets.Jools.settings.base` below). Only the app
    # target runs the Inject Build Metadata postBuildScript that needs
    # `git rev-parse`; JoolsKit and the test targets should keep the
    # Xcode 26 default of sandboxed scripts. (CodeRabbit review.)
    # Xcode 26's "Validate Project Settings" recommendations — both
    # generate type-safe Swift accessors at compile time:
    #
    #   - GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS lets you write
    #     `Image(.appIcon)` / `Color(.joolsAccent)` instead of the
    #     stringly-typed `Image("AppIcon")` form.
    #   - STRING_CATALOG_GENERATE_SYMBOLS does the same for strings
    #     once we adopt String Catalogs (no-op until then).
    #
    # Mirrored here so they survive `make generate` — XcodeGen would
    # otherwise blow away whatever Xcode wrote into project.pbxproj.
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES

packages:
  JoolsKit:
    path: JoolsKit

targets:
  Jools:
    type: application
    platform: iOS
    sources:
      - path: Jools
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: JoolsKit
    postBuildScripts:
      - name: Inject Build Metadata
        script: |
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          # Detached-HEAD-safe branch lookup. CI builds check out a
          # specific commit (detached HEAD) where `git rev-parse
          # --abbrev-ref HEAD` returns literal "HEAD", which ends up
          # baked into the Info.plist as the branch name. Prefer
          # $GITHUB_REF_NAME when it's set (GitHub Actions supplies it
          # with the real branch/tag), otherwise fall back to the git
          # query, and finally to "unknown". (CodeRabbit review.)
          if [ -n "${GITHUB_REF_NAME:-}" ]; then
            GIT_BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH_RAW=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
            if [ "${BRANCH_RAW}" = "HEAD" ]; then
              GIT_BRANCH="detached"
            else
              GIT_BRANCH="${BRANCH_RAW}"
            fi
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          /usr/libexec/PlistBuddy -c "Delete :JOOLS_GIT_SHA" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Delete :JOOLS_GIT_BRANCH" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Delete :JOOLS_BUILD_DATE" "$INFO_PLIST" >/dev/null 2>&1 || true

          /usr/libexec/PlistBuddy -c "Add :JOOLS_GIT_SHA string $GIT_SHA" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :JOOLS_GIT_BRANCH string $GIT_BRANCH" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :JOOLS_BUILD_DATE string $BUILD_DATE" "$INFO_PLIST"

          # BGTaskScheduler permitted identifiers for background session polling
          /usr/libexec/PlistBuddy -c "Delete :BGTaskSchedulerPermittedIdentifiers" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers:0 string com.indrasvat.jataayu.session-check" "$INFO_PLIST"
        basedOnDependencyAnalysis: false
    settings:
      base:
        # Scoped to the app target only because only `Inject Build
        # Metadata` above needs access to `git rev-parse`. JoolsKit,
        # JoolsTests and JoolsUITests keep the sandboxed-scripts
        # default. (CodeRabbit review.)
        ENABLE_USER_SCRIPT_SANDBOXING: false
        PRODUCT_BUNDLE_IDENTIFIER: com.indrasvat.jataayu
        PRODUCT_NAME: Jataayu
        PRODUCT_MODULE_NAME: Jools
        MARKETING_VERSION: "1.2.2"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Pinned to the project owner's individual Apple Developer team
        # so a fresh `make generate` on any of the owner's machines (or
        # local CI) picks the right team automatically. Other
        # contributors signing in with their own Apple ID can override
        # via Xcode → Signing & Capabilities, which writes a per-user
        # *.xcuserdata override that XcodeGen leaves alone.
        DEVELOPMENT_TEAM: R65679C4F3
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIBackgroundModes: fetch
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  JoolsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JoolsTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Jools
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Jataayu.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Jataayu"
        BUNDLE_LOADER: "$(TEST_HOST)"

  JoolsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JoolsUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Jools
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Jools
