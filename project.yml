name: Jools
options:
  bundleIdPrefix: com.indrasvat
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.1"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  JoolsKit:
    path: JoolsKit

targets:
  Jools:
    type: application
    platform: iOS
    sources:
      - path: Jools
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: JoolsKit
    preBuildScripts:
      - name: Generate Build Info
        script: |
          # Generate BuildInfo.swift with git SHA and build date
          OUTPUT_FILE="${SRCROOT}/Jools/Core/BuildInfo.swift"
          GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          cat > "$OUTPUT_FILE" << EOF
          // Auto-generated file - do not edit
          import Foundation

          enum BuildInfo {
              static let gitSHA = "$GIT_SHA"
              static let gitBranch = "$GIT_BRANCH"
              static let buildDate = "$BUILD_DATE"
              static let version = Bundle.main.infoDictionary?["CFBundleShortVersionString"] as? String ?? "1.0.0"
              static let build = Bundle.main.infoDictionary?["CFBundleVersion"] as? String ?? "1"

              static var fullVersion: String {
                  "\(version) (\(build))"
              }

              static var debugDescription: String {
                  "\(fullVersion) • \(gitSHA) • \(gitBranch)"
              }
          }
          EOF
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.indrasvat.jools
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  JoolsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JoolsTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Jools
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Jools.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Jools"
        BUNDLE_LOADER: "$(TEST_HOST)"
